name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # ビルド時に評価される環境変数のダミー値（型チェック/コンパイル用）。
      # 実際のデプロイでは Vercel の環境変数を使用する。
      - name: Build
        run: npm run build
        env:
          DATABASE_URL: "postgresql://user:password@localhost:5432/placeholder?sslmode=require"
          NEON_AUTH_BASE_URL: "https://placeholder.neonauth.example.com/placeholder/auth"
          NEON_AUTH_COOKIE_SECRET: "ci_placeholder_cookie_secret_at_least_32_chars_long"
          GEMINI_API_KEY: "placeholder"
